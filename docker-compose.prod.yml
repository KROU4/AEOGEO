name: aeogeo

x-api-environment: &api-environment
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aeogeo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aeogeo}
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: ${CORS_ORIGINS}
  CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
  LOG_JSON: ${LOG_JSON:-true}

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeogeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aeogeo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      args:
        INSTALL_CRAWL: 0
    ports:
      - "127.0.0.1:${API_PORT:-8020}:${PORT:-8000}"
    environment:
      <<: *api-environment
      SKIP_ALEMBIC: ${SKIP_ALEMBIC:-0}
    env_file:
      - ./packages/api/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
          if [ "$$SKIP_ALEMBIC" != "1" ]; then
            uv run alembic upgrade head
          fi
          exec uv run uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --no-access-log

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile.prod
    ports:
      - "127.0.0.1:${WEB_PORT:-8030}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
