# Local dev: `docker compose up --build`
#
# Hot reload:
# - API: uvicorn --reload + volume mounts for app / alembic / geo-audit
# - Web: Vite HMR + CHOKIDAR_USEPOLLING for bind-mount (Docker Desktop Windows/macOS)
#
# Ports and prefixes: copy compose.env.example → .env in the repo root.
name: aeogeo

x-api-build: &api-build
  context: .
  dockerfile: packages/api/Dockerfile
  args:
    INSTALL_CRAWL: 0

x-api-environment: &api-environment
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aeogeo}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-aeogeo}
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${WEB_PORT:-5173}}

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeogeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-aeogeo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aeogeo} -d ${POSTGRES_DB:-aeogeo}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: *api-build
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *api-environment
      SKIP_ALEMBIC: ${SKIP_ALEMBIC:-0}
    env_file:
      - ./packages/api/.env
    volumes:
      - ./packages/api/app:/work/packages/api/app
      - ./packages/api/alembic:/work/packages/api/alembic
      - ./packages/api/alembic.ini:/work/packages/api/alembic.ini
      - ./packages/geo-audit:/work/packages/geo-audit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
          if [ "$$SKIP_ALEMBIC" != "1" ]; then
            uv run alembic upgrade head
          fi
          exec uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 \
            --no-access-log \
            --reload-dir /work/packages/api/app --reload-dir /work/packages/geo-audit

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${API_PORT:-8000}}
      CHOKIDAR_USEPOLLING: ${DEV_WATCH_POLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-1000}
    volumes:
      - ./packages/web:/app/packages/web
      - web_node_modules:/app/node_modules
      - web_pkg_modules:/app/packages/web/node_modules
    depends_on:
      - api
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
          cd /app/packages/web
          exec bun run dev -- --host 0.0.0.0 --port 5173

volumes:
  pgdata:
  redisdata:
  web_node_modules:
  web_pkg_modules:
