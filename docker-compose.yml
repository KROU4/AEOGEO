# Local dev: `docker compose up --build`
#
# Hot reload:
# - API: uvicorn --reload + монтирование app / alembic / geo-audit
# - Web: Vite HMR + CHOKIDAR_USEPOLLING для bind-mount (Docker Desktop Windows/macOS)
# - Widget: фоновый `vite build --watch`, чтобы dist/widget.js обновлялся без ребилда контейнера
# - temporal-worker: watchfiles перезапускает процесс при изменении .py в app и geo-audit
#
# Важно: в контейнере API переменные DATABASE_URL / REDIS_URL задаются ниже (хосты db, redis),
# они перекрывают packages/api/.env, если там указан localhost.
#
# Порты и префиксы: скопируйте compose.env.example → .env в корне репозитория.
#
name: aeogeo

x-api-build: &api-build
  context: .
  dockerfile: packages/api/Dockerfile

# Имена переменных без DATABASE_URL/REDIS_URL из корневого .env — иначе подстановка
# ${DATABASE_URL:-...} подхватит localhost с хоста и сломает сеть между контейнерами.
x-api-environment: &api-environment
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aeogeo}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-aeogeo}
  REDIS_URL: redis://redis:6379/0
  TEMPORAL_HOST: temporal:7233
  TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
  TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-aeogeo-pipeline}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${WEB_PORT:-5173}}

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeogeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-aeogeo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aeogeo} -d ${POSTGRES_DB:-aeogeo}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "${TEMPORAL_GRPC_PORT:-7233}:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      LOG_LEVEL: error
      SKIP_SCHEMA_SETUP: "true"
      SKIP_DEFAULT_NAMESPACE_CREATION: "true"
      SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES: "true"
      POSTGRES_USER: ${POSTGRES_USER:-aeogeo}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_SEEDS: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    # Теги без префикса v; старые вроде :2.28 могут отсутствовать на Docker Hub
    image: ${TEMPORAL_UI_IMAGE:-temporalio/ui:2.48.2}
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  api:
    build: *api-build
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *api-environment
    env_file:
      - ./packages/api/.env
    volumes:
      - ./packages/api/app:/work/packages/api/app
      - ./packages/api/alembic:/work/packages/api/alembic
      - ./packages/api/alembic.ini:/work/packages/api/alembic.ini
      - ./packages/geo-audit:/work/packages/geo-audit
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      sh -lc "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
      --reload-dir /work/packages/api/app --reload-dir /work/packages/geo-audit"

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${API_PORT:-8000}}
      # File watching on bind mounts (enable=false on native Linux if CPU usage is high)
      CHOKIDAR_USEPOLLING: ${DEV_WATCH_POLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-1000}
    volumes:
      - ./packages/web:/app/packages/web
      - ./packages/widget:/app/packages/widget
      - web_node_modules:/app/node_modules
      - web_pkg_modules:/app/packages/web/node_modules
      - widget_pkg_modules:/app/packages/widget/node_modules
    depends_on:
      - api
    restart: unless-stopped
    command: >-
      sh -lc "cd /app/packages/web && bun run build:widget &&
      (cd /app/packages/widget && bun run dev) &
      cd /app/packages/web && exec bun run dev:live"

  temporal-worker:
    build: *api-build
    environment:
      <<: *api-environment
    env_file:
      - ./packages/api/.env
    volumes:
      - ./packages/api/app:/work/packages/api/app
      - ./packages/api/alembic:/work/packages/api/alembic
      - ./packages/api/alembic.ini:/work/packages/api/alembic.ini
      - ./packages/geo-audit:/work/packages/geo-audit
    command: >-
      sh -lc "cd /work/packages/api && exec uv run watchfiles --filter python
      'uv run python -m app.workflows.worker' app /work/packages/geo-audit"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  web_node_modules:
  web_pkg_modules:
  widget_pkg_modules:
