services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./packages/api:/app
    env_file:
      - ./packages/api/.env.example
    depends_on:
      - db
      - redis
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web:/app
      - /app/node_modules
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aeogeo
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: aeogeo
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - POSTGRES_USER=aeogeo
      - POSTGRES_PWD=localdev
      - POSTGRES_SEEDS=db
    depends_on:
      - db

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  temporal-worker:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    command: uv run python -m app.workflows.worker
    env_file:
      - ./packages/api/.env.example
    volumes:
      - ./packages/api:/app
    depends_on:
      - db
      - redis
      - temporal

volumes:
  pgdata:
