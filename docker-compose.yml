services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./packages/api/app:/app/app
      - ./packages/api/alembic:/app/alembic
      - ./packages/api/alembic.ini:/app/alembic.ini
    env_file:
      - ./packages/api/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command: sh -lc "uv run alembic upgrade head && uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web:/app/packages/web
      - ./packages/widget:/app/packages/widget
      - /app/node_modules
      - /app/packages/web/node_modules
      - /app/packages/widget/node_modules
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeogeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-aeogeo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeogeo} -d ${POSTGRES_DB:-aeogeo}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - LOG_LEVEL=error
      - SKIP_SCHEMA_SETUP=true
      - SKIP_DEFAULT_NAMESPACE_CREATION=true
      - SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES=true
      - POSTGRES_USER=${POSTGRES_USER:-aeogeo}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-localdev}
      - POSTGRES_SEEDS=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  temporal-worker:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    command: uv run python -m app.workflows.worker
    env_file:
      - ./packages/api/.env
    volumes:
      - ./packages/api/app:/app/app
      - ./packages/api/alembic:/app/alembic
      - ./packages/api/alembic.ini:/app/alembic.ini
    depends_on:
      - db
      - redis
      - temporal
    restart: unless-stopped

volumes:
  pgdata:
